baseURL: https://xyanrch1024.github.io
theme: PaperMod

defaultContentLanguage: zh
defaultContentLanguageInSubdir: false

languages:
  zh:
    languageName: 中文
    weight: 1
    title: xyanrch 的博客
    params:
      homeInfoParams:
        Title: "你好 👋"
        Content: "欢迎来到我的博客"
    menu:
      main:
        - identifier: posts
          name: 文章
          url: /posts/
          weight: 10
        - identifier: search
          name: 搜索
          url: /search/
          weight: 20
  en:
    languageName: English
    weight: 2
    title: xyanrch's Blog
    params:
      homeInfoParams:
        Title: "Hello 👋"
        Content: "Welcome to my blog"
    menu:
      main:
        - identifier: posts
          name: Posts
          url: /en/posts/
          weight: 10
        - identifier: search
          name: Search
          url: /en/search/
          weight: 20

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  socialIcons:
    - name: github
      url: "https://github.com/xyanrch1024"
