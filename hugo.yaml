baseURL: https://xyanrch1024.github.io
theme: PaperMod

defaultContentLanguage: zh
defaultContentLanguageInSubdir: false

languages:
  zh:
    languageName: 中文
    weight: 1
    title: xyanrch 的博客
    params:
      homeInfoParams:
        Title: "你好"
        Content: "欢迎来到我的博客"
    menu:
      main:
        - identifier: posts
          name: 文章
          url: /posts/
          weight: 10
        - identifier: search
          name: 搜索
          url: /search/
          weight: 20
        - identifier: about
          name: 关于
          url: /about/
          weight: 30
        - identifier: categories
          name: 分类
          url: /categories/
          weight: 40
        - identifier: tags
          name: 标签
          url: /tags/
          weight: 50
  en:
    languageName: English
    weight: 2
    title: xyanrch's Blog
    params:
      homeInfoParams:
        Title: "Hello"
        Content: "Welcome to my blog"
    menu:
      main:
        - identifier: posts
          name: Posts
          url: /en/posts/
          weight: 10
        - identifier: search
          name: Search
          url: /en/search/
          weight: 20
        - identifier: about
          name: About
          url: /en/about/
          weight: 30
        - identifier: categories
          name: Categories
          url: /en/categories/
          weight: 40
        - identifier: tags
          name: Tags
          url: /en/tags/
          weight: 50

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true

params:
  socialIcons:
    - name: github
      url: "https://github.com/xyanrch1024"
