baseURL: https://xyanrch1024.github.io
theme: PaperMod

defaultContentLanguage: en
defaultContentLanguageInSubdir: false

languages:
  zh:
    languageName: 中文
    weight: 1
    title: xyanrch 的博客
    params:
      homeInfoParams:
        Title: "太阳强烈，水波温柔"
        Content: |-
          热爱自由，喜欢编程，乐于探索未知，享受旅行。

          活在这珍贵的人间
    menu:
      main:
        - identifier: posts
          name: 文章
          url: /zh/posts/
          weight: 10
        - identifier: archives
          name: 归档
          url: /zh/archives/
          weight: 20
        - identifier: search
          name: 搜索
          url: /zh/search/
          weight: 25
        - identifier: about
          name: 关于
          url: /zh/about/
          weight: 30
        - identifier: categories
          name: 分类
          url: /zh/categories/
          weight: 40
        - identifier: tags
          name: 标签
          url: /zh/tags/
          weight: 50
        - identifier: github
          name: GitHub
          url: https://github.com/xyanrch1024
          weight: 60
  en:
    languageName: English
    weight: 2
    title: xyanrch's Blog
    params:
      logo:
        text: "xyanrch's Blog"
      homeInfoParams:
        Title: "Strong sun, gentle waves"
        Content: |-
          Love freedom, love coding, enjoy exploring the unknown, love traveling.

          Living in this precious world
    menu:
      main:
        - identifier: posts
          name: Posts
          url: /posts/
          weight: 10
        - identifier: archives
          name: Archive
          url: /archives/
          weight: 20
        - identifier: search
          name: Search
          url: /search/
          weight: 25
        - identifier: about
          name: About
          url: /about/
          weight: 30
        - identifier: categories
          name: Categories
          url: /categories/
          weight: 40
        - identifier: tags
          name: Tags
          url: /tags/
          weight: 50
        - identifier: github
          name: GitHub
          url: https://github.com/xyanrch1024
          weight: 60

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  ShowReadingTime: true
  ShowBreadCrumbs: true
  ShowPostNavLinks: true
  ShowCodeCopyButtons: true
  ShowToc: true
  ShowShareButtons: false
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true

  cover:
    hiddenInList: false
    hiddenInSingle: false

markup:
  goldmark:
    renderer:
      unsafe: true
